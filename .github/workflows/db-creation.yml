name: Sample - Database Creation

on:
  workflow_dispatch:
    inputs:
      db_names:
        description: "Database names (comma-separated: pmprod,pmtest,pmdev)"
        required: true
        type: string

jobs:
  create-database:
    name: Create ${{ matrix.db_name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        db_name: ${{ split(inputs.db_names, ',') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install ppd
        run: pip install -e .

      - name: Setup environment
        run: |
          mkdir -p /tmp/ppd/work
          mkdir -p /tmp/ppd/logs
          mkdir -p /tmp/ppd/data
          mkdir -p /tmp/ppd/schema

          echo "WORK_DIR=/tmp/ppd/work" >> $GITHUB_ENV
          echo "LOG_DIR=/tmp/ppd/logs" >> $GITHUB_ENV

      - name: Sanitize schema
        run: |
          ppd db sanitize-df \
            --input-schema schema/${{ matrix.db_name }}.df \
            --output-schema /tmp/ppd/schema/${{ matrix.db_name }}.sanitized.df

      - name: Create database
        run: |
          ppd db create \
            --db-path /tmp/ppd/data/${{ matrix.db_name }} \
            --schema-file /tmp/ppd/schema/${{ matrix.db_name }}.sanitized.df \
            --structure-file schema/${{ matrix.db_name }}.st \
            -o /tmp/ppd/logs/create.log

      - name: Load seed data
        run: |
          ppd db load-data \
            --data-file data/${{ matrix.db_name }} \
            --db-path /tmp/ppd/data/${{ matrix.db_name }} \
            -o /tmp/ppd/logs/loaddata.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-logs-${{ matrix.db_name }}
          path: /tmp/ppd/logs
